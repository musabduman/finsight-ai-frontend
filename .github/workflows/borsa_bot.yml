name: FinSight Borsa Veri Toplayıcı

on:
  schedule:
    # HER SAAT çalışır (UTC saatiyle)
    - cron: '0 21-23,0-20 * * *' 
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  veri_cek_ve_kaydet:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu İndir (Checkout)
      uses: actions/checkout@v4

    - name: Python Ortamını Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: Gerekli Kütüphaneleri Yükle
      run: | 
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r requirements.txt
        
    - name: Haber Çekme ve Pinecone Bulutuna Yazma
      env:
        PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      run: python otomatik_haber_cekme.py
