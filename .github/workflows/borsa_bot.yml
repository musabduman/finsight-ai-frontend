name: FinSight Borsa Veri Toplayıcı

on:
  schedule:
    # Hafta içi her gün Türkiye saatiyle 18:30'da (UTC 15:30) çalışır.
    - cron: '30 15 * * 1-5'
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  veri_cek_ve_kaydet:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu İndir (Checkout)
      uses: actions/checkout@v4

    - name: Python Ortamını Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: Gerekli Kütüphaneleri Yükle
      run: | 
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Haber Çekme ve Pinecone Bulutuna Yazma
      # Kendi Python ana dosyanın adını buraya yaz (örn: scraper.py)
      run: python ana_kodun.py 
      env:
        # Pinecone anahtarını GitHub Secrets'tan güvenlice çekiyoruz
        PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}